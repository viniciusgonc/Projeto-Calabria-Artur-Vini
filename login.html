<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login de Clientes — ArtWinners TI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #form-login .btn-primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      letter-spacing: .5px;
    }
 
    .link-troca-senha {
      font-size: .85rem;
      color: var(--ink-light);
      display: block;
      text-align: right;
      margin-top: -.5rem;
      margin-bottom: .75rem;
    }
 
    .link-troca-senha:hover {
      color: var(--brand);
    }
 
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.25rem 0;
      color: var(--gray-300);
      font-size: .82rem;
    }
 
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }
 
    .btn-login-loading {
      opacity: .75;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="auth-page">
  <header class="auth-header">
    <div class="logo-area" style="align-items:center;">
      <span class="logo-text">ArtWinners <strong>TI</strong></span>
      <span class="logo-slogan">A arte que te faz vencer no mercado</span>
    </div>
  </header>
  <div class="header-gradient-bar"></div>
 
  <main class="auth-main">
    <section class="form-wrapper" aria-label="Formulário de login">
      <div class="auth-logo">
        <span>ArtWinners</span> <span style="color: var(--brand);">TI</span>
      </div>
 
      <h1 class="auth-title">Login de Clientes</h1>
 
      <div id="alerta-login" class="alerta-box erro" style="display:none;"></div>
 
      <form id="form-login" novalidate autocomplete="off">
        <div class="form-group">
          <label for="input-login">E-mail (Login)</label>
          <input
            type="email"
            id="input-login"
            name="login"
            placeholder="seu@email.com"
            autocomplete="username"
            maxlength="120" />
          <span id="input-login-erro" class="msg-erro"></span>
        </div>
 
        <a href="troca-senha.html" class="link-troca-senha">Esqueceu sua senha?</a>
 
        <div class="form-group">
          <label for="input-senha">Senha</label>
          <div class="senha-wrapper">
            <input
              type="password"
              id="input-senha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              maxlength="64" />
            <button
              type="button"
              class="btn-toggle-senha"
              onclick="toggleSenha('input-senha', this)"
              aria-label="Mostrar senha"
              title="Mostrar senha">
            </button>
          </div>
          <span id="input-senha-erro" class="msg-erro"></span>
        </div>
 
        <div class="form-actions">
          <button
            type="button"
            id="btn-login"
            class="btn btn-primary"
            onclick="realizarLogin()">
            🔐 Realizar Login
          </button>
 
          <button
            type="button"
            id="btn-limpar"
            class="btn btn-secondary"
            onclick="limparFormLogin()">
            🗑️ Limpar
          </button>
        </div>
      </form>
 
      <div class="divider">ou</div>
 
      <div class="auth-links">
        Não tem conta?
        <a href="cadastro.html">Cadastrar-se agora</a>
        &nbsp;·&nbsp;
        <a href="index.html">← Voltar à Home</a>
      </div>
    </section>
  </main>
 
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
 
  <script src="js/firebase-config.js"></script>
  <script src="js/validacoes.js"></script>
  <script src="js/main.js"></script>
 
  <script>
    /* ── Realiza login com Firebase ─────────────────────────── */
    async function realizarLogin() {
      const inLogin  = document.getElementById('input-login');
      const inSenha  = document.getElementById('input-senha');
      const alerta   = document.getElementById('alerta-login');
      const form     = document.getElementById('form-login');
      const btnLogin = document.getElementById('btn-login');
 
      limparTodosErros(form);
      ocultarAlerta(alerta);
 
      /* ── Validações locais (requisito do professor) ── */
      let valido = true;
 
      const emailVal = inLogin.value.trim();
      if (!emailVal) {
        mostrarErro(inLogin, 'O campo de e-mail (login) deve ser preenchido.');
        valido = false;
      } else if (!validarEmail(emailVal)) {
        mostrarErro(inLogin, 'O e-mail informado não tem formato válido. Ex: usuario@dominio.com');
        valido = false;
      }
 
      const senhaVal = inSenha.value;
      if (!senhaVal) {
        mostrarErro(inSenha, 'A senha deve ser preenchida.');
        valido = false;
      }
 
      if (!valido) {
        mostrarAlerta(alerta, 'Por favor, corrija os erros indicados abaixo.', 'erro');
        return;
      }
 
      /* ── Autenticação Firebase ── */
      btnLogin.disabled = true;
      btnLogin.textContent = '⏳ Entrando...';
 
      try {
        const cred = await fbAuth.signInWithEmailAndPassword(emailVal, senhaVal);
        const user = cred.user;
 
        // Busca o nome do usuário no Firestore
        const perfil = await buscarPerfil(user.uid).catch(() => null);
        const nome = perfil ? perfil.nome : 'Cliente ArtWinners';
 
        Auth.login(emailVal, nome);
 
        alert('Validação realizada com sucesso! Bem-vindo(a), ' + nome.split(' ')[0] + '!');
        window.location.href = 'index.html';
 
      } catch (err) {
        console.error('Erro de login:', err);
 
        let msg = 'Erro ao realizar login. Tente novamente.';
 
        switch (err.code) {
          case 'auth/user-not-found':
          case 'auth/invalid-email':
          case 'auth/wrong-password':
          case 'auth/invalid-credential':
            msg = 'E-mail ou senha incorretos. Verifique seus dados.';
            break;
          case 'auth/too-many-requests':
            msg = 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
            break;
          case 'auth/network-request-failed':
            msg = 'Falha de conexão. Verifique sua internet.';
            break;
        }
 
        mostrarAlerta(alerta, msg, 'erro');
 
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML = '🔐 Realizar Login';
      }
    }
 
    /* ── Limpa o formulário ─────────────────────────────────── */
    function limparFormLogin() {
      const form    = document.getElementById('form-login');
      const inLogin = document.getElementById('input-login');
      const inSenha = document.getElementById('input-senha');
      const alerta  = document.getElementById('alerta-login');
 
      inLogin.value = '';
      inSenha.value = '';
 
      resetarBotoesSenha(form);
      limparTodosErros(form);
      ocultarAlerta(alerta);
      inLogin.focus();
    }
 
    /* ── Inicialização da página ────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {
      // Entra com Enter em qualquer campo
      ['input-login', 'input-senha'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') realizarLogin(); });
      });
 
      // Inicializa ícone do olhinho
      resetarBotoesSenha(document.getElementById('form-login'));
 
      document.getElementById('input-login').focus();
 
      // Se já está logado, redireciona
      fbAuth.onAuthStateChanged(user => {
        if (user) window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
